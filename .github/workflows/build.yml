name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Build React App and Bundle
      run: npm run build

    - name: Package Windows (electron-builder)
      if: matrix.os == 'windows-latest'
      run: npm run electron:pack:win

    - name: Package macOS (electron-builder)
      if: matrix.os == 'macos-latest'
      run: npm run electron:pack:mac
      env:
        # Ignore macOS code signing (we don't have an Apple Developer Certificate right now)
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: FocusBuddy-Windows
        path: release/*.exe

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: FocusBuddy-macOS
        path: release/*.dmg
